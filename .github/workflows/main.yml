name: Update Detailed GitHub Stats

on:
  schedule:
    # Runs every 12 hours (adjust as needed)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: GitHub Activity Readme
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This specifies the section marker in your README
          SECTION_NAME: detailed_activity
          # You can customize the look of the table here (Markdown/HTML)
          COMMIT_MSG: "🤖 Automático: Actualizando estadísticas detalladas de actividad"
